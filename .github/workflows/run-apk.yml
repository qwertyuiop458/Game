name: Run J2ME APK + JAR

on:
  workflow_dispatch:
    inputs:
      apk_source:
        description: "Local path in repo or HTTPS URL to emulator APK"
        type: string
        required: true
        default: "ru.playsoftware.j2meloader-101.apk"
      jar_source:
        description: "Local path in repo or HTTPS URL to JAR"
        type: string
        required: true
        default: "240x320-rus-zombie-infection.jar"
      strict_mode:
        description: "Fail workflow if JAR start cannot be confirmed from emulator signals"
        type: boolean
        required: true
        default: true
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    paths:
      - '.github/workflows/run-apk.yml'
      - 'tools/ci/launch_j2me_in_emulator.sh'
      - 'ru.playsoftware.j2meloader-101.apk'
      - '240x320-rus-zombie-infection.jar'
  push:
    paths:
      - '.github/workflows/run-apk.yml'
      - 'tools/ci/launch_j2me_in_emulator.sh'
      - 'ru.playsoftware.j2meloader-101.apk'
      - '240x320-rus-zombie-infection.jar'

jobs:
  run-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Resolve workflow sources
        id: sources
        env:
          DEFAULT_APK_SOURCE: ru.playsoftware.j2meloader-101.apk
          DEFAULT_JAR_SOURCE: 240x320-rus-zombie-infection.jar
          SCHEDULED_APK_SOURCE: ${{ vars.APK_SOURCE_URL }}
          SCHEDULED_JAR_SOURCE: ${{ vars.JAR_SOURCE_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "apk_source=${{ inputs.apk_source }}" >> "$GITHUB_OUTPUT"
            echo "jar_source=${{ inputs.jar_source }}" >> "$GITHUB_OUTPUT"
            echo "strict_mode=${{ inputs.strict_mode && '1' || '0' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "apk_source=${SCHEDULED_APK_SOURCE:-$DEFAULT_APK_SOURCE}" >> "$GITHUB_OUTPUT"
            echo "jar_source=${SCHEDULED_JAR_SOURCE:-$DEFAULT_JAR_SOURCE}" >> "$GITHUB_OUTPUT"
            echo "strict_mode=0" >> "$GITHUB_OUTPUT"
          else
            echo "apk_source=$DEFAULT_APK_SOURCE" >> "$GITHUB_OUTPUT"
            echo "jar_source=$DEFAULT_JAR_SOURCE" >> "$GITHUB_OUTPUT"
            echo "strict_mode=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Launch emulator, install APK, run JAR
        uses: reactivecircus/android-emulator-runner@v2
        env:
          STRICT_MODE: ${{ steps.sources.outputs.strict_mode }}
          APK_SOURCE: ${{ steps.sources.outputs.apk_source }}
          JAR_SOURCE: ${{ steps.sources.outputs.jar_source }}
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_4
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            bash tools/ci/launch_j2me_in_emulator.sh \
              "$APK_SOURCE" \
              "$JAR_SOURCE" \
              .artifacts/emulator

      - name: Print run status
        if: always()
        run: |
          if [ -f .artifacts/emulator/result.env ]; then
            cat .artifacts/emulator/result.env
          else
            echo "status=missing"
            echo "reason=result.env not generated"
          fi

      - name: Upload emulator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-output
          path: .artifacts/emulator
          if-no-files-found: warn
