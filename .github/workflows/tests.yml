name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run contract smoke tests
        run: |
          pytest -q tests/test_summary_contract.py tests/test_extract_zombie_infection_summary.py

      - name: Run tests
        run: pytest -q
